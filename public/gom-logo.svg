<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A" />
      <stop offset="100%" stop-color="#0D1B2A" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="50%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Rounded App Icon Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Inner Glowing Ring -->
  <rect x="24" y="24" width="464" height="464" rx="88" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-opacity="0.3" />

  <!-- Stylized Globe Map Background -->
  <g id="globe-map" opacity="0.55">
    <!-- Globe Circular Boundary -->
    <circle cx="256" cy="256" r="160" fill="none" stroke="url(#goldGrad)" stroke-width="3" />
    
    <!-- Globe Grid Lines (Latitudes) -->
    <line x1="96" y1="256" x2="416" y2="256" stroke="url(#goldGrad)" stroke-width="2" />
    <ellipse cx="256" cy="256" rx="160" ry="55" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" />
    <ellipse cx="256" cy="256" rx="160" ry="110" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" />
    
    <!-- Globe Grid Lines (Longitudes) -->
    <line x1="256" y1="96" x2="256" y2="416" stroke="url(#goldGrad)" stroke-width="2" />
    <ellipse cx="256" cy="256" rx="55" ry="160" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" />
    <ellipse cx="256" cy="256" rx="110" ry="160" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" />
  </g>

  <!-- Center Big Text "GOM" -->
  <text x="256" y="305" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="150" fill="url(#goldGrad)" filter="url(#shadow)" letter-spacing="2" text-anchor="middle">GOM</text>
</svg>
